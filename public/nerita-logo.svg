<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Nerita snail shell logo - spiral representing scan/OCR motion -->
  <defs>
    <linearGradient id="nerita-shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="nerita-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Snail body (foot) - curved along the bottom -->
  <path d="M 6 50 Q 20 46, 36 48 Q 48 49, 56 46 L 56 52 Q 48 56, 36 55 Q 20 54, 6 56 Z"
        fill="url(#nerita-body)"/>

  <!-- Antennae/tentacles -->
  <line x1="52" y1="46" x2="56" y2="36" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="48" y1="46" x2="50" y2="34" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="56" cy="35" r="1.6" fill="#0f766e"/>
  <circle cx="50" cy="33" r="1.6" fill="#0f766e"/>

  <!-- Shell - logarithmic spiral -->
  <g transform="translate(28, 30)">
    <!-- outer shell -->
    <circle cx="0" cy="0" r="18" fill="url(#nerita-shell)"/>
    <!-- spiral curve -->
    <path d="M 0 0
             m 0 -14
             a 14 14 0 1 1 -0.1 0
             m -0 4
             a 10 10 0 1 0 0.1 0
             m 0 3
             a 7 7 0 1 1 -0.1 0
             m 0 2.5
             a 4.5 4.5 0 1 0 0.1 0
             m 0 1.8
             a 2.7 2.7 0 1 1 -0.1 0"
          fill="none" stroke="#ffffff" stroke-width="1.4" stroke-opacity="0.85" stroke-linecap="round"/>
    <!-- shell opening -->
    <ellipse cx="-14" cy="6" rx="3.5" ry="5" fill="#064e3b" transform="rotate(-30 -14 6)"/>
  </g>
</svg>
